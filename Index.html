<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rsvp-reader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font-display: 'JetBrains Mono', monospace;
  --font-body: 'Inter', sans-serif;
  --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
  --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
  --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
  --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
  --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
  --text-2xl: clamp(2rem, 1.2rem + 2.5vw, 3.5rem);
  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
  --space-4: 1rem; --space-6: 1.5rem; --space-8: 2rem;
  --space-10: 2.5rem; --space-12: 3rem; --space-16: 4rem;
  --radius-sm: 0.375rem; --radius-md: 0.5rem;
  --radius-lg: 0.75rem; --radius-xl: 1rem; --radius-full: 9999px;
  --transition: 150ms cubic-bezier(0.16, 1, 0.3, 1);
}

:root, [data-theme="dark"] {
  --color-bg: #0e0e0c;
  --color-surface: #141412;
  --color-surface-2: #1a1a17;
  --color-surface-offset: #1f1f1c;
  --color-border: oklch(0.9 0 0 / 0.08);
  --color-text: #e8e6e0;
  --color-text-muted: #7a7870;
  --color-text-faint: #454340;
  --color-primary: #00d4aa;
  --color-primary-dim: oklch(0.72 0.14 168 / 0.15);
  --color-red: #ff5c5c;
  --color-red-dim: oklch(0.65 0.2 25 / 0.18);
  --shadow-md: 0 4px 24px oklch(0 0 0 / 0.4);
}

[data-theme="light"] {
  --color-bg: #f5f4f0;
  --color-surface: #fafaf7;
  --color-surface-2: #ffffff;
  --color-surface-offset: #eeede9;
  --color-border: oklch(0.2 0 0 / 0.1);
  --color-text: #1a1916;
  --color-text-muted: #6b6963;
  --color-text-faint: #b5b3ae;
  --color-primary: #008c72;
  --color-primary-dim: oklch(0.48 0.12 168 / 0.1);
  --color-red: #d93434;
  --color-red-dim: oklch(0.5 0.2 25 / 0.1);
  --shadow-md: 0 4px 24px oklch(0.2 0 0 / 0.1);
}

html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
body {
  min-height: 100dvh;
  font-family: var(--font-body);
  font-size: var(--text-base);
  color: var(--color-text);
  background: var(--color-bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: var(--space-8) var(--space-4);
  transition: background var(--transition), color var(--transition);
}

/* HEADER */
header {
  width: 100%;
  max-width: 720px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--space-10);
}

.logo {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  font-family: var(--font-display);
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--color-primary);
  letter-spacing: 0.08em;
}

.logo svg { flex-shrink: 0; }

.theme-btn {
  width: 36px; height: 36px;
  border-radius: var(--radius-md);
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  color: var(--color-text-muted);
  display: grid; place-items: center;
  cursor: pointer;
  transition: background var(--transition), color var(--transition);
}
.theme-btn:hover { color: var(--color-text); background: var(--color-surface-2); }

/* DISPLAY — simulated ESP32 TFT screen */
.screen-wrap {
  width: 100%;
  max-width: 720px;
  margin-bottom: var(--space-8);
}

.screen {
  background: #050505;
  border-radius: var(--radius-xl);
  border: 2px solid oklch(0.9 0 0 / 0.06);
  box-shadow:
    0 0 0 1px oklch(0.9 0 0 / 0.04),
    var(--shadow-md),
    inset 0 1px 0 oklch(1 0 0 / 0.04);
  aspect-ratio: 4/3;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: var(--space-8);
  position: relative;
  overflow: hidden;
}

/* CRT scanlines effect — subtle */
.screen::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    oklch(0 0 0 / 0.04) 2px,
    oklch(0 0 0 / 0.04) 4px
  );
  pointer-events: none;
  z-index: 2;
}

.screen-status {
  position: absolute;
  top: var(--space-3);
  left: var(--space-4);
  right: var(--space-4);
  display: flex;
  justify-content: space-between;
  font-family: var(--font-display);
  font-size: 11px;
  color: #3a3a38;
  z-index: 3;
}

.status-dot {
  width: 6px; height: 6px;
  border-radius: var(--radius-full);
  background: #2a2a28;
  display: inline-block;
  margin-right: 5px;
  transition: background 0.2s;
}
.status-dot.active { background: #00d4aa; box-shadow: 0 0 6px #00d4aa80; }

/* Focus line — Spritz ORP */
.orp-line {
  position: absolute;
  top: 0; bottom: 0;
  width: 1px;
  background: oklch(0.65 0.2 25 / 0.35);
  z-index: 1;
  transition: opacity 0.2s;
  pointer-events: none;
}

/* Word display */
.word-container {
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 3;
  min-height: 80px;
}

.word-display {
  font-family: var(--font-display);
  font-size: clamp(1.8rem, 5vw, 3.2rem);
  font-weight: 700;
  letter-spacing: 0.02em;
  line-height: 1;
  text-align: center;
  color: #d8d6d0;
  transition: opacity 0.06s ease;
}

.word-display .orp-char { color: #ff5c5c; }

/* Progress bar */
.screen-progress {
  position: absolute;
  bottom: 0; left: 0;
  height: 3px;
  background: #00d4aa;
  box-shadow: 0 0 8px #00d4aa60;
  transition: width 0.1s linear;
  z-index: 3;
  border-radius: 0 2px 2px 0;
}

/* Idle state text */
.screen-idle {
  font-family: var(--font-display);
  font-size: var(--text-sm);
  color: #2a2a28;
  text-align: center;
  line-height: 2;
  z-index: 3;
}

/* CONTROLS */
.controls {
  width: 100%;
  max-width: 720px;
  display: flex;
  flex-direction: column;
  gap: var(--space-6);
}

.control-row {
  display: flex;
  gap: var(--space-3);
  align-items: stretch;
}

.btn {
  padding: var(--space-3) var(--space-6);
  border-radius: var(--radius-md);
  font-family: var(--font-body);
  font-size: var(--text-sm);
  font-weight: 500;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all var(--transition);
  white-space: nowrap;
}

.btn-primary {
  background: var(--color-primary);
  color: #050505;
  border-color: var(--color-primary);
  flex: 1;
  font-weight: 600;
}
.btn-primary:hover { filter: brightness(1.1); }
.btn-primary:active { filter: brightness(0.9); }

.btn-ghost {
  background: var(--color-surface);
  color: var(--color-text-muted);
  border-color: var(--color-border);
}
.btn-ghost:hover { color: var(--color-text); background: var(--color-surface-2); }

/* WPM Slider */
.wpm-control {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-4) var(--space-6);
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
}

.wpm-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.wpm-label {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 500;
}

.wpm-value {
  font-family: var(--font-display);
  font-size: var(--text-xl);
  font-weight: 700;
  color: var(--color-primary);
  line-height: 1;
}

.wpm-unit {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  margin-left: 2px;
}

input[type=range] {
  -webkit-appearance: none;
  width: 100%;
  height: 4px;
  background: var(--color-surface-offset);
  border-radius: var(--radius-full);
  outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px; height: 18px;
  border-radius: var(--radius-full);
  background: var(--color-primary);
  cursor: pointer;
  box-shadow: 0 0 8px oklch(0.72 0.14 168 / 0.4);
  transition: box-shadow var(--transition);
}
input[type=range]::-webkit-slider-thumb:hover {
  box-shadow: 0 0 14px oklch(0.72 0.14 168 / 0.6);
}

.wpm-presets {
  display: flex;
  gap: var(--space-2);
}

.preset-btn {
  flex: 1;
  padding: var(--space-1) 0;
  border-radius: var(--radius-sm);
  background: transparent;
  border: 1px solid var(--color-border);
  font-family: var(--font-display);
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  cursor: pointer;
  transition: all var(--transition);
  text-align: center;
}
.preset-btn:hover, .preset-btn.active {
  background: var(--color-primary-dim);
  border-color: var(--color-primary);
  color: var(--color-primary);
}

/* Text input area */
.text-area-wrap {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-4) var(--space-6);
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
}

.area-label {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 500;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

textarea {
  width: 100%;
  min-height: 100px;
  background: var(--color-surface-offset);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: var(--space-3) var(--space-4);
  font-family: var(--font-body);
  font-size: var(--text-sm);
  color: var(--color-text);
  resize: vertical;
  outline: none;
  transition: border-color var(--transition);
  line-height: 1.6;
}
textarea:focus { border-color: oklch(0.72 0.14 168 / 0.5); }
textarea::placeholder { color: var(--color-text-faint); }

/* Stats bar */
.stats-bar {
  display: flex;
  gap: var(--space-6);
  padding: var(--space-3) var(--space-6);
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
}

.stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.stat-value {
  font-family: var(--font-display);
  font-size: var(--text-base);
  font-weight: 700;
  color: var(--color-text);
  font-variant-numeric: tabular-nums;
}

.stat-label {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* Completed state */
.completed-msg {
  font-family: var(--font-display);
  font-size: var(--text-base);
  color: var(--color-primary);
  text-align: center;
  z-index: 3;
  display: none;
}

@media (max-width: 480px) {
  .control-row { flex-direction: column; }
  .btn { width: 100%; }
  .stats-bar { flex-wrap: wrap; gap: var(--space-4); }
}
</style>
</head>
<body>
<header>
  <div class="logo">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-label="RSVP Reader">
      <rect x="1" y="4" width="18" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/>
      <path d="M6 10h8M10 7v6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.2"/>
    </svg>
    RSVP_READER
  </div>
  <button class="theme-btn" data-theme-toggle aria-label="Toggle theme">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</header>

<main style="width:100%;max-width:720px;display:flex;flex-direction:column;gap:var(--space-6)">

  <!-- SCREEN -->
  <div class="screen-wrap">
    <div class="screen" id="screen">
      <div class="screen-status">
        <span><span class="status-dot" id="statusDot"></span><span id="statusText">IDLE</span></span>
        <span id="screenWpm">— WPM</span>
      </div>
      <div class="orp-line" id="orpLine" style="opacity:0"></div>
      <div class="word-container" id="wordContainer">
        <div class="screen-idle">
          <div style="color:#353533;font-size:13px;">▸ PRESS PLAY</div>
          <div style="color:#252523;font-size:11px;margin-top:6px;">ESP32 + ILI9341</div>
        </div>
      </div>
      <div class="completed-msg" id="completedMsg">✓ DONE</div>
      <div class="screen-progress" id="progressBar" style="width:0%"></div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">

    <div class="stats-bar">
      <div class="stat">
        <div class="stat-value" id="statCurrent">0</div>
        <div class="stat-label">Слово</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statTotal">0</div>
        <div class="stat-label">Всего</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statTime">0:00</div>
        <div class="stat-label">Время</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statEta">—</div>
        <div class="stat-label">Осталось</div>
      </div>
    </div>

    <div class="wpm-control">
      <div class="wpm-header">
        <span class="wpm-label">Скорость</span>
        <span><span class="wpm-value" id="wpmDisplay">300</span><span class="wpm-unit">WPM</span></span>
      </div>
      <input type="range" id="wpmSlider" min="100" max="800" step="25" value="300">
      <div class="wpm-presets">
        <button class="preset-btn" data-wpm="150">150</button>
        <button class="preset-btn active" data-wpm="300">300</button>
        <button class="preset-btn" data-wpm="450">450</button>
        <button class="preset-btn" data-wpm="600">600</button>
      </div>
    </div>

    <div class="control-row">
      <button class="btn btn-primary" id="playBtn">▶ СТАРТ</button>
      <button class="btn btn-ghost" id="resetBtn">↺ СБРОС</button>
    </div>

    <div class="text-area-wrap">
      
      <div class="area-label" style="display:flex; align-items:center; width:100%;">
        <span>Текст</span>
        <label for="fileInput" style="cursor:pointer; color:var(--color-primary); font-size:12px; margin-left:15px; border:1px solid var(--color-primary); padding:2px 8px; border-radius:4px; transition:0.2s;">📎 Загрузить (.txt, .epub, .fb2)</label>
        <input type="file" id="fileInput" accept=".txt,.epub,.fb2" style="display:none;">
        <span id="wordCountLabel" style="font-variant-numeric:tabular-nums; margin-left:auto;">0 слов</span>
      </div>

      <textarea id="textInput" placeholder="Вставь текст для чтения...">Быстрое последовательное визуальное предъявление — это метод чтения при котором слова показываются по одному в фиксированной точке экрана. Глазам не нужно двигаться по строке что значительно ускоряет восприятие текста. Метод был разработан компанией Spritz и с тех пор получил широкое распространение в мобильных приложениях и носимых устройствах. На ESP32 с дисплеем ILI9341 такой ридер можно собрать буквально за вечер используя библиотеку TFT eSPI и немного кода на Arduino IDE.</textarea>
    </div>

  </div>
</main>

<script>
(function(){
  // Theme
  const html = document.documentElement;
  const tb = document.querySelector('[data-theme-toggle]');
  let theme = 'dark';
  html.setAttribute('data-theme', theme);
  tb.addEventListener('click', () => {
    theme = theme === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', theme);
    tb.innerHTML = theme === 'dark'
      ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
      : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
  });

  // State
  let words = [];
  let current = 0;
  let wpm = 300;
  let playing = false;
  let timer = null;
  let startTime = null;
  let elapsed = 0;
  let clockTimer = null;

  const wpmSlider = document.getElementById('wpmSlider');
  const wpmDisplay = document.getElementById('wpmDisplay');
  const playBtn = document.getElementById('playBtn');
  const resetBtn = document.getElementById('resetBtn');
  const textInput = document.getElementById('textInput');
  const wordContainer = document.getElementById('wordContainer');
  const progressBar = document.getElementById('progressBar');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const screenWpm = document.getElementById('screenWpm');
  const orpLine = document.getElementById('orpLine');
  const completedMsg = document.getElementById('completedMsg');
  const statCurrent = document.getElementById('statCurrent');
  const statTotal = document.getElementById('statTotal');
  const statTime = document.getElementById('statTime');
  const statEta = document.getElementById('statEta');
  const wordCountLabel = document.getElementById('wordCountLabel');

  // Parse words
  function parseText(txt) {
    return txt.trim().split(/\s+/).filter(w => w.length > 0);
  }

  function updateWordCount() {
    words = parseText(textInput.value);
    statTotal.textContent = words.length;
    wordCountLabel.textContent = words.length + ' слов';
  }
  textInput.addEventListener('input', updateWordCount);
  updateWordCount();

  // WPM control
  wpmSlider.addEventListener('input', () => {
    wpm = parseInt(wpmSlider.value);
    wpmDisplay.textContent = wpm;
    screenWpm.textContent = wpm + ' WPM';
    document.querySelectorAll('.preset-btn').forEach(b => {
      b.classList.toggle('active', parseInt(b.dataset.wpm) === wpm);
    });
    if (playing) { clearInterval(timer); startInterval(); }
  });

  document.querySelectorAll('.preset-btn').forEach(b => {
    b.addEventListener('click', () => {
      wpm = parseInt(b.dataset.wpm);
      wpmSlider.value = wpm;
      wpmDisplay.textContent = wpm;
      screenWpm.textContent = wpm + ' WPM';
      document.querySelectorAll('.preset-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      if (playing) { clearInterval(timer); startInterval(); }
    });
  });

  // Render word with ORP highlight (middle char in red)
  function renderWord(word) {
    if (!word) return;
    const mid = Math.floor(word.length / 2);
    let html = '';
    for (let i = 0; i < word.length; i++) {
      if (i === mid) {
        html += `<span class="orp-char">${word[i]}</span>`;
      } else {
        html += word[i];
      }
    }

    const el = document.createElement('div');
    el.className = 'word-display';
    el.innerHTML = html;
    el.style.opacity = '0';

    wordContainer.innerHTML = '';
    wordContainer.appendChild(el);

    // Position ORP line under middle char
    requestAnimationFrame(() => {
      el.style.opacity = '1';
      const screen = document.getElementById('screen');
      const midChar = el.querySelector('.orp-char');
      if (midChar) {
        const sr = screen.getBoundingClientRect();
        const cr = midChar.getBoundingClientRect();
        const x = cr.left + cr.width / 2 - sr.left;
        orpLine.style.left = x + 'px';
        orpLine.style.opacity = '0.4';
      }
    });
  }

  function showIdle() {
    wordContainer.innerHTML = '<div class="screen-idle"><div style="color:#353533;font-size:13px;">▸ PRESS PLAY</div><div style="color:#252523;font-size:11px;margin-top:6px;">ESP32 + ILI9341</div></div>';
    orpLine.style.opacity = '0';
    completedMsg.style.display = 'none';
  }

  function showCompleted() {
    wordContainer.innerHTML = '';
    completedMsg.style.display = 'block';
    orpLine.style.opacity = '0';
    progressBar.style.width = '100%';
    statusText.textContent = 'DONE';
    statusDot.classList.remove('active');
  }

  function fmtTime(ms) {
    const s = Math.floor(ms / 1000);
    return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
  }

  function startInterval() {
    const delay = Math.round(60000 / wpm);
    timer = setInterval(() => {
      if (current >= words.length) {
        stopReading();
        showCompleted();
        return;
      }
      renderWord(words[current]);
      statCurrent.textContent = current + 1;
      const pct = words.length > 1 ? (current / (words.length - 1)) * 100 : 100;
      progressBar.style.width = pct + '%';

      // ETA
      const remaining = words.length - current - 1;
      const etaMs = (remaining / wpm) * 60000;
      statEta.textContent = fmtTime(etaMs);

      current++;
    }, delay);
  }

  function startReading() {
    words = parseText(textInput.value);
    if (words.length === 0) return;
    statTotal.textContent = words.length;
    playing = true;
    playBtn.textContent = '⏸ ПАУЗА';
    statusDot.classList.add('active');
    statusText.textContent = 'PLAY';
    screenWpm.textContent = wpm + ' WPM';
    completedMsg.style.display = 'none';
    if (!startTime) startTime = Date.now() - elapsed;
    clockTimer = setInterval(() => {
      elapsed = Date.now() - startTime;
      statTime.textContent = fmtTime(elapsed);
    }, 500);
    startInterval();
  }

  function pauseReading() {
    playing = false;
    clearInterval(timer);
    clearInterval(clockTimer);
    elapsed = Date.now() - startTime;
    playBtn.textContent = '▶ ПРОДОЛЖИТЬ';
    statusText.textContent = 'PAUSE';
    statusDot.classList.remove('active');
  }

  function stopReading() {
    playing = false;
    clearInterval(timer);
    clearInterval(clockTimer);
    playBtn.textContent = '▶ СТАРТ';
    statusDot.classList.remove('active');
  }

  function resetAll() {
    stopReading();
    current = 0;
    startTime = null;
    elapsed = 0;
    statCurrent.textContent = '0';
    statTime.textContent = '0:00';
    statEta.textContent = '—';
    progressBar.style.width = '0%';
    statusText.textContent = 'IDLE';
    playBtn.textContent = '▶ СТАРТ';
    showIdle();
  }

  playBtn.addEventListener('click', () => {
    if (playing) { pauseReading(); }
    else { startReading(); }
  });

  resetBtn.addEventListener('click', resetAll);

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.target === textInput) return;
    if (e.code === 'Space') { e.preventDefault(); playBtn.click(); }
    if (e.code === 'KeyR') { resetAll(); }
    if (e.code === 'ArrowUp') { wpm = Math.min(800, wpm + 25); wpmSlider.value = wpm; wpmDisplay.textContent = wpm; screenWpm.textContent = wpm + ' WPM'; if (playing) { clearInterval(timer); startInterval(); } }
    if (e.code === 'ArrowDown') { wpm = Math.max(100, wpm - 25); wpmSlider.value = wpm; wpmDisplay.textContent = wpm; screenWpm.textContent = wpm + ' WPM'; if (playing) { clearInterval(timer); startInterval(); } }
  });

})();
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
async function parseEpub(file) {
  const zip = await JSZip.loadAsync(file);

  // Find container.xml
  const container = await zip.file("META-INF/container.xml").async("string");
  const parser = new DOMParser();
  const containerDoc = parser.parseFromString(container, "text/xml");
  const rootfile = containerDoc.querySelector("rootfile").getAttribute("full-path");

  // Parse the OPF file
  const opf = await zip.file(rootfile).async("string");
  const opfDoc = parser.parseFromString(opf, "text/xml");

  // Base path of OPF
  const basePath = rootfile.substring(0, rootfile.lastIndexOf('/') + 1);

  // Get manifest and spine
  const manifest = {};
  opfDoc.querySelectorAll("manifest > item").forEach(item => {
    manifest[item.getAttribute("id")] = item.getAttribute("href");
  });

  const spine = [];
  opfDoc.querySelectorAll("spine > itemref").forEach(item => {
    const idref = item.getAttribute("idref");
    if (manifest[idref]) {
      spine.push(manifest[idref]);
    }
  });

  let fullText = '';
  for (let href of spine) {
    const filePath = basePath + href;
    const fileData = zip.file(filePath);
    if (!fileData) continue;

    const content = await fileData.async("string");
    const doc = parser.parseFromString(content, "text/html");

    // Extract text from body
    if (doc.body) {
       fullText += doc.body.textContent + '\n\n';
    }
  }

  return fullText.replace(/\s{2,}/g, ' ').trim();
}

async function parseFb2(file) {
  const text = await file.text();
  const parser = new DOMParser();
  const doc = parser.parseFromString(text, "text/xml");

  const body = doc.querySelector("body");
  if (!body) return "";

  return body.textContent.replace(/\s{2,}/g, ' ').trim();
}

document.addEventListener('DOMContentLoaded', () => {
  const fileInput = document.getElementById('fileInput');
  const textInput = document.getElementById('textInput');
  const wordCountLabel = document.getElementById('wordCountLabel');

  fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const ext = file.name.split('.').pop().toLowerCase();
    textInput.value = 'Загрузка ' + file.name + '...';

    try {
      let text = '';
      if (ext === 'txt') {
        text = await file.text();
      } else if (ext === 'epub') {
        text = await parseEpub(file);
      } else if (ext === 'fb2') {
        text = await parseFb2(file);
      } else {
        throw new Error("Неподдерживаемый формат. Используйте .txt, .epub или .fb2");
      }

      textInput.value = text;
      // Trigger input event so the reader logic can pick it up
      textInput.dispatchEvent(new Event('input'));

    } catch (err) {
      console.error(err);
      textInput.value = 'Ошибка: ' + err.message;
    }
  });
});
</script>
